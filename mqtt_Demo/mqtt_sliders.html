<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Slider Control</title>
    <style>
        @font-face {
            font-family: "ABC Normal";
            src: url("fonts/ABCNormalNormal.woff2") format("woff2");
            font-weight: 400;
        }

        @font-face {
            font-family: "ABC Normal";
            src: url("fonts/ABCNormalNeutral.woff2") format("woff2");
            font-weight: 500;
        }

        :root {
            --prim: #5414F9;
            --sec: #E75517;
            --tert: #8FFF00;
            --light: #FCFEFF;
            --dark: #0e0f11;
            
            --shadow: 0em 10.52083em 4.21875em rgba(0, 0, 0, 0.02),
                0em 5.9375em 3.54167em rgba(0, 0, 0, 0.06),
                0em 2.65625em 2.65625em rgba(0, 0, 0, 0.1),
                0em 0.67708em 1.45833em rgba(0, 0, 0, 0.12),
                0em 0em 0em rgba(0, 0, 0, 0.12);;
        }
        @media (prefers-color-scheme: dark) {
            :root {
            --prim: #5414F9;
            --sec: #E75517;
            --tert: #8FFF00;
            --light: #0e0f11;
            --dark: #FCFEFF;

            --shadow: 0em 10.52083em 4.21875em rgba(0, 0, 0, 0.141),
                0em 5.9375em 3.54167em rgba(0, 0, 0, 0.187),
                0em 2.65625em 2.65625em rgba(0, 0, 0, 0.253),
                0em 0.67708em 1.45833em rgba(0, 0, 0, 0.286),
                0em 0em 0em rgba(0, 0, 0, 0.341);
        }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--light);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.04em;

            font-family: "ABC Normal", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 1.5vw;
            letter-spacing: -0.02em;
        }

        .container {
            background: var(--light);
            border-radius: 0.625em;
            padding: 2.08em;
            max-width: 26.04em;
            width: 100%;

            box-shadow: var(--shadow);
        }

        h1 {
            text-align: center;
            margin-bottom: 2.08em;
            font-size: 1.75em;
            font-weight: 500;
        }

        .slider-group {
            margin-bottom: 1.82em;
        }

        .slider-group:last-child {
            margin-bottom: 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.63em;
        }

        .slider-label label {
            font-size: 0.83em;
            font-weight: 600;
        }

        .slider-value {
            font-size: 0.83em;
            font-weight: 600;
            color: #5414F9;
            min-width: 2.6em;
            text-align: right;
        }

        input[type="range"] {
            width: 100%;
            height: 0.42em;
            border-radius: 0.21em;
            background: var(--dark);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 1.25em;
            height: 1.25em;
            border-radius: 50%;
            background: var(--sec);
            cursor: pointer;
            box-shadow: 0 0.1em 0.42em rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: var(--sec);
            box-shadow: 0 0.21em 0.63em rgba(102, 126, 234, 0.6);
        }

        input[type="range"]::-moz-range-thumb {
            width: 1.25em;
            height: 1.25em;
            border-radius: 50%;
            background: var(--sec);
            cursor: pointer;
            border: none;
            box-shadow: 0 0.1em 0.42em rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            background: var(--sec);
            box-shadow: 0 0.21em 0.63em rgba(102, 126, 234, 0.6);
        }

        .connection-status {
            text-align: center;
            margin-top: 1.56em;
            padding-top: 1.04em;
            border-top: 1px solid var(--light);
            font-size: 0.73em;
        }

        .status-indicator {
            display: inline-block;
            width: 0.63em;
            height: 0.63em;
            border-radius: 50%;
            margin-right: 0.42em;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: var(--tert);
            animation: none;
        }

        .status-indicator.disconnected {
            background: var(--prim);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status-text {
            color: #666;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Display Slider Control</h1>

        <div class="slider-group">
            <div class="slider-label">
                <label for="iaqSlider">IAQ (Indoor Air Quality)</label>
                <span class="slider-value" id="iaqValue">250</span>
            </div>
            <input type="range" id="iaqSlider" min="0" max="500" value="250">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <label for="humiditySlider">rel. Humidity</label>
                <span class="slider-value" id="humidityValue">50<span>%</span></span>
            </div>
            <input type="range" id="humiditySlider" min="0" max="100" value="50">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <label for="temperatureSlider">Temperature</label>
                <span class="slider-value" id="temperatureValue">17.5<span>°C</span></span>
            </div>
            <input type="range" id="temperatureSlider" min="-5" max="32" value="17.5" step="0.5">
        </div>

        <div class="connection-status">
            <span class="status-indicator disconnected" id="statusIndicator"></span>
            <span class="status-text" id="statusText">Verbindungsaufbau...</span>
        </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
        let client = null;
        let url_string = "";
        let user, pw;
        let isConnected = false;

        const MQTT_TOPICS = {
            iaq: "air/iaq",
            humidity: "air/hum",
            temperature: "air/temp"
        };

        // Initialize MQTT Client
        function initMQTT(user, pw) {
            url_string = "wss://" + user + ":" + pw + "@" + user + ".cloud.shiftr.io";
            client = mqtt.connect(url_string, {
                clientId: "DemoDatas"
            });

            client.on('connect', onConnect);
            client.on('error', onFailure);
            client.on('close', onConnectionLost);

            client.publish(MQTT_TOPICS.iaq, document.getElementById("iaqSlider").value.toString());
            client.publish(MQTT_TOPICS.humidity, document.getElementById("humiditySlider").value.toString());
            client.publish(MQTT_TOPICS.temperature, document.getElementById("temperatureSlider").value.toString());
        }

        function onConnect() {
            console.log("Connected to MQTT Broker with user:pw —", user, pw);
            for (const topic in MQTT_TOPICS) {
                client.subscribe(MQTT_TOPICS[topic]);
            }
            isConnected = true;
            updateConnectionStatus(true);
        }

        function onConnectionLost(responseObject) {
            if (responseObject.errorCode !== 0) {
                console.log("Connection lost:", responseObject.errorMessage);
            }
            isConnected = false;
            updateConnectionStatus(false);
        }

        function onFailure(error) {
            console.log("Connection failed:", error);
            isConnected = false;
            updateConnectionStatus(false);
            // Retry connection after 3 seconds
            setTimeout(initMQTT, 3000);
        }

        function updateConnectionStatus(connected) {
            const indicator = document.getElementById("statusIndicator");
            const statusText = document.getElementById("statusText");

            if (connected) {
                indicator.classList.remove("disconnected");
                indicator.classList.add("connected");
                statusText.textContent = "Verbunden mit " + user + ".cloud.shiftr.io";
            } else {
                indicator.classList.remove("connected");
                indicator.classList.add("disconnected");
                statusText.textContent = "Getrennt - Verbindung wird hergestellt...";
            }
        }

        // Slider event listeners
        document.getElementById("iaqSlider").addEventListener("input", function () {
            const value = parseInt(this.value);
            document.getElementById("iaqValue").textContent = value;
            client.publish(MQTT_TOPICS.iaq, value.toString());
        });

        document.getElementById("humiditySlider").addEventListener("input", function () {
            const value = parseInt(this.value);
            document.getElementById("humidityValue").textContent = value;
            client.publish(MQTT_TOPICS.humidity, value.toString());
        });

        document.getElementById("temperatureSlider").addEventListener("input", function () {
            const value = parseFloat(this.value);
            document.getElementById("temperatureValue").textContent = value;
            client.publish(MQTT_TOPICS.temperature, value.toString());
        });

        // Initialize MQTT connection when page loads
        window.addEventListener("load", function () {
            // parse URL parameter(s) for user, password and a custom string, then call initMQTT(pw, user, custom)
            (function() {
                const params = new URLSearchParams(window.location.search);
                user = params.get('user');
                pw = params.get('pw');
            
                if(params.has('user') && params.has('pw')) {
                    initMQTT(user, pw);
                }
                else {
                    alert("Benutzername und Passwort in die URL, z.B.: ?user=xyz&pw=abc");
                }
            })();
            //initMQTT();
        });
    </script>
</body>

</html>
